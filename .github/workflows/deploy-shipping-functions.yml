name: Deploy Shipping Functions

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - shipping-agent-complete-20260719
    paths:
      - 'supabase/functions/shipping-agent/**'
      - 'supabase/functions/shipping-awb/**'
      - 'supabase/functions/shipping-api/**'
      - 'supabase/config.toml'
      - '.github/workflows/deploy-shipping-functions.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: buivecgahhmrhlmfujgt
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate access token
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN" || (echo "Missing SUPABASE_ACCESS_TOKEN GitHub secret" && exit 1)

      - name: Deploy internal shipping agent
        run: supabase functions deploy shipping-agent --project-ref "$PROJECT_REF"

      - name: Deploy internal AWB generator
        run: supabase functions deploy shipping-awb --project-ref "$PROJECT_REF"

      - name: Deploy external AI shipping API
        run: supabase functions deploy shipping-api --project-ref "$PROJECT_REF" --no-verify-jwt
