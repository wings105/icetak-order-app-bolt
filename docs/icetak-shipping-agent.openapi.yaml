openapi: 3.1.0
info:
  title: iCetak Shipping Agent API
  version: 1.1.0
  description: |
    Live RPC gateway for trusted AI agents and external systems. ParcelDaily
    credentials remain inside the iCetak backend.
servers:
  - url: https://buivecgahhmrhlmfujgt.supabase.co
paths:
  /rest/v1/rpc/shipping_api_gateway:
    post:
      operationId: runShippingAction
      summary: Run an authenticated shipping action
      security:
        - SupabaseApiKey: []
          SupabaseBearer: []
          ICetakApiKey: []
      parameters:
        - in: header
          name: apikey
          required: true
          schema:
            type: string
        - in: header
          name: Authorization
          required: true
          schema:
            type: string
          description: Bearer plus the Supabase legacy anon JWT.
        - in: header
          name: X-API-Key
          required: true
          schema:
            type: string
          description: Scoped iCetak shipping API key.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [p_payload]
              properties:
                p_payload:
                  $ref: '#/components/schemas/ShippingRequest'
            examples:
              directCreateAndBook:
                value:
                  p_payload:
                    action: create_and_book_shipment
                    reference: AI-ORDER-12345
                    confidence: 0.98
                    order_context:
                      paid: true
                      production_ready: true
                      order_total_rm: 85
                    delivery_address:
                      fullName: Customer Name
                      phone: '60123456789'
                      line1: 12 Jalan Example
                      line2: ''
                      city: Kota Bharu
                      postcode: '15000'
                      state: Kelantan
                      country: Malaysia
                    parcel:
                      weight_kg: 1
                      content: decoration cake
                      content_value_rm: 85
                    options:
                      courier_preference: auto
              createFromExistingOrder:
                value:
                  p_payload:
                    action: create_and_book_shipment
                    order_reference:
                      order_id: EXTERNAL-ORDER-ID
                    reference: EXTERNAL-ORDER-ID
                    confidence: 1
                    options:
                      courier_preference: auto
              tracking:
                value:
                  p_payload:
                    action: get_tracking
                    tracking_no: MY069538660237
              awb:
                value:
                  p_payload:
                    action: get_awb
                    tracking_no: MY069538660237
      responses:
        '200':
          description: Action result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShippingResponse'
  /rest/v1/rpc/shipping_public_tracking:
    post:
      operationId: getPublicTracking
      summary: Read a safe public tracking timeline
      security:
        - SupabaseApiKey: []
          SupabaseBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [p_public_tracking_token]
              properties:
                p_public_tracking_token:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Safe shipment and event timeline
components:
  securitySchemes:
    SupabaseApiKey:
      type: apiKey
      in: header
      name: apikey
    SupabaseBearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
    ICetakApiKey:
      type: apiKey
      in: header
      name: X-API-Key
  schemas:
    ShippingRequest:
      type: object
      required: [action]
      properties:
        action:
          type: string
          enum:
            - check_readiness
            - get_quote
            - create_shipment
            - create_and_checkout
            - create_and_book_shipment
            - get_tracking
            - list_events
            - get_order_shipping
            - get_awb
        request_id:
          type: string
        reference:
          type: string
          description: Stable unique reference used for duplicate prevention.
        confidence:
          type: number
          minimum: 0
          maximum: 1
          description: Direct-address autonomous creation requires at least 0.95.
        order_reference:
          type: object
          properties:
            id: { type: string, format: uuid }
            order_no: { type: string }
            order_id: { type: string }
            external_order_id: { type: string }
        order_context:
          type: object
          properties:
            paid: { type: boolean }
            production_ready: { type: boolean }
            order_total_rm: { type: number }
        delivery_address:
          type: object
          required: [fullName, phone, line1, city, postcode, state]
          properties:
            fullName: { type: string }
            companyName: { type: string }
            phone: { type: string }
            email: { type: string }
            line1: { type: string }
            line2: { type: string }
            city: { type: string }
            postcode: { type: string }
            state: { type: string }
            country: { type: string, default: Malaysia }
        parcel:
          type: object
          properties:
            weight_kg: { type: number, default: 1 }
            content: { type: string, default: decoration cake }
            content_value_rm: { type: number, default: 50 }
            is_dropoff: { type: boolean, default: false }
        options:
          type: object
          properties:
            courier_preference: { type: string, default: auto }
        shipment_id: { type: string, format: uuid }
        tracking_no: { type: string }
        provider_order_id: { type: string }
    ShippingResponse:
      type: object
      properties:
        success: { type: boolean }
        duplicate_prevented: { type: boolean }
        gateway_http_status: { type: integer }
        shipment:
          type: object
          additionalProperties: true
        events:
          type: array
          items:
            type: object
            additionalProperties: true
        awb:
          type: object
          additionalProperties: true
        error:
          type: object
          additionalProperties: true
